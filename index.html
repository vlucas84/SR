<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Sales RQP iframe</title>
  <style>
    body {
      margin: 0;
    }

    iframe {
      width: 100%;
      height: 100vh;
      border: 0;
    }
  </style>
</head>
<body>
  <iframe id="salesRqpFrame" title="Sales RQP"></iframe>

  <script>
    async function loadSalesRqpIframe() {
      const appUrl = 'https://vlucas84.github.io';

      const initialData = {
        firstName: 'Jane',
        lastName: 'Homeowner',
        phone: '5551234567',
        email: 'jane.homeowner@example.com'
      };

      // Должен быть ваш backend endpoint
      const tokenResponse = await fetch('https://your-backend.example.com/api/launch-token');
      const tokenData = await tokenResponse.json();

      const launchToken = tokenData.launchToken;

      const url = new URL('/sales-rqp', appUrl);
      url.searchParams.set('launchToken', launchToken);
      url.searchParams.set(
        'initialData',
        window.btoa(JSON.stringify(initialData))
      );

      document.getElementById('salesRqpFrame').src = url.toString();
    }

    loadSalesRqpIframe();
  </script>
</body>
</html>
